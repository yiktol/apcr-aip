AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito configuration with multiple social identity providers (using SSM Parameter Store)

Parameters:
  ParameterPrefix:
    Type: String
    Description: SSM Parameter Store prefix for Cognito configuration
    Default: /genai/cognito
  CognitoUserEmail:
    Type: String
    Description: Email address for the initial Cognito user
    NoEcho: true
  GoogleClientSecret:
    Type: String
    Description: Google OAuth client secret
    NoEcho: true
  FacebookAppSecret:
    Type: String
    Description: Facebook app secret
    NoEcho: true
  AmazonAppSecret:
    Type: String
    Description: Amazon app secret
    NoEcho: true
  PublicHostedZone:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/PublicHostedZone
  CloudfrontDomainName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/CloudfrontDomainName
  GenAIDomainName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/GenAIDomainName
  GoogleClientId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/GoogleClientId
  FacebookAppId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/FacebookAppId
  AmazonAppId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/AmazonAppId
  UserPoolName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/UserPoolName

Resources:

  UserPool:
    Type: 'AWS::Cognito::UserPool'
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 6
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 10

  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "email profile openid"
      AttributeMapping:
        email: email
        name: name
        given_name: given_name
        family_name: family_name
        picture: picture

  FacebookIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Facebook
      ProviderType: Facebook
      ProviderDetails:
        client_id: !Ref FacebookAppId
        client_secret: !Ref FacebookAppSecret
        authorize_scopes: "email public_profile"
      AttributeMapping:
        email: email

  AmazonIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: LoginWithAmazon
      ProviderType: LoginWithAmazon
      ProviderDetails:
        client_id: !Ref AmazonAppId
        client_secret: !Ref AmazonAppSecret
        authorize_scopes: "profile postal_code"
      AttributeMapping:
        email: email
        name: name

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'auth.${PublicHostedZone}'
      UserPoolId: !Ref UserPool
      ManagedLoginVersion: 2
      CustomDomainConfig: 
        CertificateArn: arn:aws:acm:us-east-1:875692608981:certificate/417df345-28ea-4c39-8e5d-d985abb59908

  CognitoCNAMERecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${PublicHostedZone}.'
      Name: !Sub 'auth.${PublicHostedZone}'
      Type: CNAME
      TTL: 60
      ResourceRecords:
        - !GetAtt UserPoolDomain.CloudFrontDistribution

  UserPoolClient:
    Type: 'AWS::Cognito::UserPoolClient'
    DependsOn: 
      - GoogleIdentityProvider
      - FacebookIdentityProvider
      - AmazonIdentityProvider
    Properties:
      RefreshTokenValidity: 30
      IdTokenValidity: 30
      AccessTokenValidity: 30
      TokenValidityUnits: 
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
        - aws.cognito.signin.user.admin
      CallbackURLs:
        - !Sub 'https://${CloudfrontDomainName}/genai-1/'
        - !Sub 'https://${CloudfrontDomainName}/genai-2/'
        - !Sub 'https://${CloudfrontDomainName}/genai-3/'
        - !Sub 'https://${CloudfrontDomainName}/genai-4/'
        - !Sub 'https://${CloudfrontDomainName}/genai-5/'
        - !Sub 'https://${GenAIDomainName}/genai-1/'
        - !Sub 'https://${GenAIDomainName}/genai-2/'
        - !Sub 'https://${GenAIDomainName}/genai-3/'
        - !Sub 'https://${GenAIDomainName}/genai-4/'
        - !Sub 'https://${GenAIDomainName}/genai-5/'
      LogoutURLs:
        - !Sub 'https://${CloudfrontDomainName}/genai-1/'
        - !Sub 'https://${CloudfrontDomainName}/genai-2/'
        - !Sub 'https://${CloudfrontDomainName}/genai-3/'
        - !Sub 'https://${CloudfrontDomainName}/genai-4/'
        - !Sub 'https://${CloudfrontDomainName}/genai-5/'
        - !Sub 'https://${GenAIDomainName}/genai-1/'
        - !Sub 'https://${GenAIDomainName}/genai-2/'
        - !Sub 'https://${GenAIDomainName}/genai-3/'
        - !Sub 'https://${GenAIDomainName}/genai-4/'
        - !Sub 'https://${GenAIDomainName}/genai-5/'
      SupportedIdentityProviders:
        - COGNITO
        - Google
        - Facebook
        - LoginWithAmazon
      GenerateSecret: true
      UserPoolId: !Ref UserPool

  ManagedLoginBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    DependsOn: UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientId: !Ref UserPoolClient
      UseCognitoProvidedValues: false
      ReturnMergedResources: false
      Settings:
        categories:
          auth:
            authMethodOrder:
              - - type: USERNAME_PASSWORD
                  display: INPUT
                - type: FEDERATED
                  display: BUTTON
            federation:
              interfaceStyle: BUTTON_LIST
              order: []
          form:
            displayGraphics: true
            location:
              horizontal: CENTER
              vertical: CENTER
            sessionTimerDisplay: NONE
          global:
            colorSchemeMode: LIGHT
            pageFooter:
              enabled: false
            pageHeader:
              enabled: false
            spacingDensity: REGULAR
        componentClasses:
          buttons:
            borderRadius: 4
          divider:
            darkMode:
              borderColor: D5DBDBff
            lightMode:
              borderColor: D5DBDBff
          focusState:
            darkMode:
              borderColor: 0073BBff
            lightMode:
              borderColor: 0073BBff
          idpButtons:
            icons:
              enabled: true
          input:
            borderRadius: 4
            darkMode:
              defaults:
                backgroundColor: FFFFFFff
                borderColor: D5DBDBff
              placeholderColor: 879596ff
            lightMode:
              defaults:
                backgroundColor: FFFFFFff
                borderColor: D5DBDBff
              placeholderColor: 879596ff
          inputDescription:
            darkMode:
              textColor: 545B64ff
            lightMode:
              textColor: 545B64ff
          inputLabel:
            darkMode:
              textColor: 232F3Eff
            lightMode:
              textColor: 232F3Eff
          link:
            darkMode:
              defaults:
                textColor: 0073BBff
            lightMode:
              defaults:
                textColor: 0073BBff

  UserPoolUser:
    Type: 'AWS::Cognito::UserPoolUser'
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref CognitoUserEmail
      DesiredDeliveryMediums:
        - EMAIL
      UserAttributes:
        - Name: email
          Value: !Ref CognitoUserEmail
        - Name: email_verified
          Value: "true"

  CognitoSecrets:
    Type: AWS::SecretsManager::Secret
    DependsOn: UserPoolClient
    Properties:
      Name: genai/essentials
      Description: "Amazon Cognito configuration information"
      SecretString: !Sub
        - |
          {
            "COGNITO_USER_POOL_ID": "${UserPool}",
            "COGNITO_APP_CLIENT_ID": "${UserPoolClient}",
            "COGNITO_APP_CLIENT_SECRET": "${UserPoolClient.ClientSecret}",
            "COGNITO_DOMAIN": "https://auth.${PublicHostedZone}",
            "COGNITO_REDIRECT_URI_1": "https://${GenAIDomainName}/genai-1/",
            "COGNITO_REDIRECT_URI_2": "https://${GenAIDomainName}/genai-2/",
            "COGNITO_REDIRECT_URI_3": "https://${GenAIDomainName}/genai-3/",
            "COGNITO_REDIRECT_URI_4": "https://${GenAIDomainName}/genai-4/",
            "COGNITO_REDIRECT_URI_5": "https://${GenAIDomainName}/genai-5/",
            "COGNITO_IDENTITY_POOL_ID": "",
            "AWS_REGION": "${AWS::Region}",
            "AWS_ACCOUNT_ID": "${AWS::AccountId}"
          }
        - {}
      Tags:
        - Key: Application
          Value: Auth

Outputs:
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Description: ARN of the User pool
    Export:
      Name: UserPoolArn
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: ID of Userpool client
    Export:
      Name: UserPoolClientId
  UserPoolDomain:
    Value: !Ref UserPoolDomain
    Description: Domain of Userpool
    Export:
      Name: UserPoolDomain
  CognitoSecretsArn:
    Value: !Ref CognitoSecrets
    Description: ARN of the Cognito secrets
    Export:
      Name: CognitoSecretsArn
