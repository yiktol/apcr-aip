AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Cognito configuration with multiple social identity providers

Parameters:
  CognitoUserEmail:
    Type: String

  PublicHostedZone:
    Type: String

  CloudfrontDomainName:
    Type: String

  GenAIDomainName:  
    Type: String
    Description: Enter the domain name for the GenAI API.
    Default: genai.aws.yikyakyuk.com

  # Google parameters
  GoogleClientId:
    Type: String
    Description: Google OAuth Client ID
    NoEcho: false
  GoogleClientSecret:
    Type: String
    Description: Google OAuth Client Secret
    NoEcho: true
  
  # Facebook parameters
  FacebookAppId:
    Type: String
    Description: Facebook App ID
    NoEcho: false
  FacebookAppSecret:
    Type: String
    Description: Facebook App Secret
    NoEcho: true
  
  # Amazon Login parameters
  AmazonAppId:
    Type: String
    Description: Amazon App ID
    NoEcho: false
  AmazonAppSecret:
    Type: String
    Description: Amazon App Secret
    NoEcho: true

  UserPoolName:
    Type: String
    Default: genai-ess-user-pool


Resources:
  UserPool:
    Type: 'AWS::Cognito::UserPool'
    Properties:
      UserPoolName: !Ref UserPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false  # Changed to false to allow users to sign up
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 6
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
          TemporaryPasswordValidityDays: 10

  # Define Google Identity Provider
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "email profile openid"
      AttributeMapping:
        email: email
        name: name
        given_name: given_name
        family_name: family_name
        picture: picture

  #Define Facebook Identity Provider
  FacebookIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Facebook
      ProviderType: Facebook
      ProviderDetails:
        client_id: !Ref FacebookAppId
        client_secret: !Ref FacebookAppSecret
        authorize_scopes: "email public_profile"
      AttributeMapping:
        email: email

  # Define Amazon Identity Provider
  AmazonIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: LoginWithAmazon
      ProviderType: LoginWithAmazon
      ProviderDetails:
        client_id: !Ref AmazonAppId
        client_secret: !Ref AmazonAppSecret
        authorize_scopes: "profile postal_code"
      AttributeMapping:
        email: email
        name: name

  # Define Cognito User Pool Domain
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub auth.${PublicHostedZone}
      UserPoolId: !Ref UserPool
      ManagedLoginVersion: "2"
      CustomDomainConfig: 
        CertificateArn: arn:aws:acm:us-east-1:875692608981:certificate/417df345-28ea-4c39-8e5d-d985abb59908

  CognitoCNAMERecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub ${PublicHostedZone}.
      Name: !Sub auth.${PublicHostedZone}
      Type: CNAME
      TTL: 60
      ResourceRecords:
        - !GetAtt UserPoolDomain.CloudFrontDistribution

  UserPoolClient:
    Type: 'AWS::Cognito::UserPoolClient'
    DependsOn: 
      - GoogleIdentityProvider
      - FacebookIdentityProvider
      - AmazonIdentityProvider
      # - AppleIdentityProvider
    Properties:
      RefreshTokenValidity: 30
      IdTokenValidity: 30
      AccessTokenValidity: 30
      TokenValidityUnits: 
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - email
        - openid
        - profile
        - aws.cognito.signin.user.admin
      CallbackURLs:
        - !Sub https://${CloudfrontDomainName}/genai-1/
        - !Sub https://${CloudfrontDomainName}/genai-2/
        - !Sub https://${CloudfrontDomainName}/genai-3/
        - !Sub https://${CloudfrontDomainName}/genai-4/
        - !Sub https://${CloudfrontDomainName}/genai-5/
        - !Sub https://${GenAIDomainName}/genai-1/
        - !Sub https://${GenAIDomainName}/genai-2/
        - !Sub https://${GenAIDomainName}/genai-3/
        - !Sub https://${GenAIDomainName}/genai-4/
        - !Sub https://${GenAIDomainName}/genai-5/
      LogoutURLs:
        - !Sub https://${CloudfrontDomainName}/genai-1/
        - !Sub https://${CloudfrontDomainName}/genai-2/
        - !Sub https://${CloudfrontDomainName}/genai-3/
        - !Sub https://${CloudfrontDomainName}/genai-4/
        - !Sub https://${CloudfrontDomainName}/genai-5/
        - !Sub https://${GenAIDomainName}/genai-1/
        - !Sub https://${GenAIDomainName}/genai-2/
        - !Sub https://${GenAIDomainName}/genai-3/
        - !Sub https://${GenAIDomainName}/genai-4/
        - !Sub https://${GenAIDomainName}/genai-5/
      SupportedIdentityProviders:
        - COGNITO
        - Google
        - Facebook
        - LoginWithAmazon
        # - SignInWithApple
      GenerateSecret: true
      UserPoolId: !Ref UserPool

  # create admin user 
  UserPoolUser:
    Type: 'AWS::Cognito::UserPoolUser'
    Properties:
      UserPoolId: !Ref UserPool
      Username: !Ref CognitoUserEmail
      DesiredDeliveryMediums:
        - EMAIL
      UserAttributes:
        - Name: email
          Value: !Ref CognitoUserEmail
        - Name: email_verified
          Value: "true"

  # Secrets Manager Resource to store Cognito info
  CognitoSecrets:
    Type: AWS::SecretsManager::Secret
    DependsOn: UserPoolClient
    Properties:
      Name: genai/essentials
      Description: "Amazon Cognito configuration information"
      SecretString: !Sub |
        {
          "COGNITO_USER_POOL_ID": "${UserPool}",
          "COGNITO_APP_CLIENT_ID": "${UserPoolClient}",
          "COGNITO_APP_CLIENT_SECRET": "${UserPoolClient.ClientSecret}",
          "COGNITO_DOMAIN": "https://auth.${PublicHostedZone}",
          "COGNITO_REDIRECT_URI_1": "https://${GenAIDomainName}/genai-1/",
          "COGNITO_REDIRECT_URI_2": "https://${GenAIDomainName}/genai-2/",
          "COGNITO_REDIRECT_URI_3": "https://${GenAIDomainName}/genai-3/",
          "COGNITO_REDIRECT_URI_4": "https://${GenAIDomainName}/genai-4/",
          "COGNITO_REDIRECT_URI_5": "https://${GenAIDomainName}/genai-5/",
          "COGNITO_IDENTITY_POOL_ID": "",
          "AWS_REGION": "${AWS::Region}",
          "AWS_ACCOUNT_ID": "${AWS::AccountId}"
        }
      Tags:
        - Key: Application
          Value: Auth


  ManagedLoginBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    Properties:
      Assets:
        - Bytes: 
          Category: PAGE_FOOTER_BACKGROUND
          ColorMode: DARK
          Extension: SVG
      ClientId: !Ref UserPoolClient
      ReturnMergedResources: false
      Settings:
        categories:
          auth:
            authMethodOrder:
              - - display: BUTTON
                  type: FEDERATED
                - display: INPUT
                  type: USERNAME_PASSWORD
            federation:
              interfaceStyle: BUTTON_LIST
              order: []
          form:
            displayGraphics: true
            instructions:
              enabled: false
            languageSelector:
              enabled: false
            location:
              horizontal: CENTER
              vertical: CENTER
            sessionTimerDisplay: NONE
          global:
            colorSchemeMode: LIGHT
            pageFooter:
              enabled: false
            pageHeader:
              enabled: false
            spacingDensity: REGULAR
          signUp:
            acceptanceElements:
              - enforcement: NONE
                textKey: en
        componentClasses:
          buttons:
            borderRadius: 8.0
          divider:
            darkMode:
              borderColor: 232b37ff
            lightMode:
              borderColor: ebebf0ff
          dropDown:
            borderRadius: 8.0
            darkMode:
              defaults:
                itemBackgroundColor: 192534ff
              hover:
                itemBackgroundColor: 081120ff
                itemBorderColor: 5f6b7aff
                itemTextColor: e9ebedff
              match:
                itemBackgroundColor: d1d5dbff
                itemTextColor: 89bdeeff
            lightMode:
              defaults:
                itemBackgroundColor: ffffffff
              hover:
                itemBackgroundColor: f4f4f4ff
                itemBorderColor: 7d8998ff
                itemTextColor: 000716ff
              match:
                itemBackgroundColor: 414d5cff
                itemTextColor: 0972d3ff
          focusState:
            darkMode:
              borderColor: 539fe5ff
            lightMode:
              borderColor: 0972d3ff
          idpButtons:
            icons:
              enabled: true
          input:
            borderRadius: 8.0
            darkMode:
              defaults:
                backgroundColor: 0f1b2aff
                borderColor: 5f6b7aff
              placeholderColor: 8d99a8ff
            lightMode:
              defaults:
                backgroundColor: ffffffff
                borderColor: 7d8998ff
              placeholderColor: 5f6b7aff
          inputDescription:
            darkMode:
              textColor: 8d99a8ff
            lightMode:
              textColor: 5f6b7aff
          inputLabel:
            darkMode:
              textColor: d1d5dbff
            lightMode:
              textColor: 000716ff
          link:
            darkMode:
              defaults:
                textColor: 539fe5ff
              hover:
                textColor: 89bdeeff
            lightMode:
              defaults:
                textColor: 0972d3ff
              hover:
                textColor: 033160ff
          optionControls:
            darkMode:
              defaults:
                backgroundColor: 0f1b2aff
                borderColor: 7d8998ff
              selected:
                backgroundColor: 539fe5ff
                foregroundColor: 000716ff
            lightMode:
              defaults:
                backgroundColor: ffffffff
                borderColor: 7d8998ff
              selected:
                backgroundColor: 0972d3ff
                foregroundColor: ffffffff
          statusIndicator:
            darkMode:
              error:
                backgroundColor: 1a0000ff
                borderColor: eb6f6fff
                indicatorColor: eb6f6fff
              pending:
                indicatorColor: AAAAAAAA
              success:
                backgroundColor: 001a02ff
                borderColor: 29ad32ff
                indicatorColor: 29ad32ff
              warning:
                backgroundColor: 1d1906ff
                borderColor: e0ca57ff
                indicatorColor: e0ca57ff
            lightMode:
              error:
                backgroundColor: fff7f7ff
                borderColor: d91515ff
                indicatorColor: d91515ff
              pending:
                indicatorColor: AAAAAAAA
              success:
                backgroundColor: f2fcf3ff
                borderColor: 037f0cff
                indicatorColor: 037f0cff
              warning:
                backgroundColor: fffce9ff
                borderColor: 8d6605ff
                indicatorColor: 8d6605ff
        components:
          alert:
            borderRadius: 12.0
            darkMode:
              error:
                backgroundColor: 1a0000ff
                borderColor: eb6f6fff
            lightMode:
              error:
                backgroundColor: fff7f7ff
                borderColor: d91515ff
          favicon:
            enabledTypes:
              - ICO
              - SVG
          form:
            backgroundImage:
              enabled: false
            borderRadius: 8.0
            darkMode:
              backgroundColor: 0f1b2aff
              borderColor: 424650ff
            lightMode:
              backgroundColor: ffffffff
              borderColor: c6c6cdff
            logo:
              enabled: false
              formInclusion: IN
              location: CENTER
              position: TOP
          idpButton:
            custom: {}
            standard:
              darkMode:
                active:
                  backgroundColor: 354150ff
                  borderColor: 89bdeeff
                  textColor: 89bdeeff
                defaults:
                  backgroundColor: 0f1b2aff
                  borderColor: c6c6cdff
                  textColor: c6c6cdff
                hover:
                  backgroundColor: 192534ff
                  borderColor: 89bdeeff
                  textColor: 89bdeeff
              lightMode:
                active:
                  backgroundColor: d3e7f9ff
                  borderColor: 033160ff
                  textColor: 033160ff
                defaults:
                  backgroundColor: ffffffff
                  borderColor: 424650ff
                  textColor: 424650ff
                hover:
                  backgroundColor: f2f8fdff
                  borderColor: 033160ff
                  textColor: 033160ff
          pageBackground:
            darkMode:
              color: 0f1b2aff
            image:
              enabled: true
            lightMode:
              color: ffffffff
          pageFooter:
            backgroundImage:
              enabled: false
            darkMode:
              background:
                color: 0f141aff
              borderColor: 424650ff
            lightMode:
              background:
                color: fafafaff
              borderColor: d5dbdbff
            logo:
              enabled: false
              location: START
          pageHeader:
            backgroundImage:
              enabled: false
            darkMode:
              background:
                color: 0f141aff
              borderColor: 424650ff
            lightMode:
              background:
                color: fafafaff
              borderColor: d5dbdbff
            logo:
              enabled: false
              location: START
          pageText:
            darkMode:
              bodyColor: b6bec9ff
              descriptionColor: b6bec9ff
              headingColor: d1d5dbff
            lightMode:
              bodyColor: 414d5cff
              descriptionColor: 414d5cff
              headingColor: 000716ff
          phoneNumberSelector:
            displayType: TEXT
          primaryButton:
            darkMode:
              active:
                backgroundColor: 539fe5ff
                textColor: 000716ff
              defaults:
                backgroundColor: 539fe5ff
                textColor: 000716ff
              disabled:
                backgroundColor: ffffffff
                borderColor: ffffffff
              hover:
                backgroundColor: 89bdeeff
                textColor: 000716ff
            lightMode:
              active:
                backgroundColor: 033160ff
                textColor: ffffffff
              defaults:
                backgroundColor: 0972d3ff
                textColor: ffffffff
              disabled:
                backgroundColor: ffffffff
                borderColor: ffffffff
              hover:
                backgroundColor: 033160ff
                textColor: ffffffff
          secondaryButton:
            darkMode:
              active:
                backgroundColor: 354150ff
                borderColor: 89bdeeff
                textColor: 89bdeeff
              defaults:
                backgroundColor: 0f1b2aff
                borderColor: 539fe5ff
                textColor: 539fe5ff
              hover:
                backgroundColor: 192534ff
                borderColor: 89bdeeff
                textColor: 89bdeeff
            lightMode:
              active:
                backgroundColor: d3e7f9ff
                borderColor: 033160ff
                textColor: 033160ff
              defaults:
                backgroundColor: ffffffff
                borderColor: 0972d3ff
                textColor: 0972d3ff
              hover:
                backgroundColor: f2f8fdff
                borderColor: 033160ff
                textColor: 033160ff
      UseCognitoProvidedValues: false
      UserPoolId: !Ref UserPool


Outputs:
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Description: ARN of the User pool
    Export:
      Name: UserPoolArn
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: ID of Userpool client
    Export:
      Name: UserPoolClientId
  UserPoolDomain:
    Value: !Ref UserPoolDomain
    Description: Domain of Userpool
    Export:
      Name: UserPoolDomain
  CognitoSecretsArn:
    Value: !Ref CognitoSecrets
    Description: ARN of the Cognito secrets
    Export:
      Name: CognitoSecretsArn
