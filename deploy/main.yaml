AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Comprehensive Network Infrastructure with VPC, Multi-AZ Subnets, Security Groups, and Web Application Stack

Parameters:
  Prefix:
    Type: String
    Description: Name to Prefix Resources

  BucketRegion:
    Type: String
    Description: Region where S3 Bucket for CloudFormation Template exists

  ParameterPrefix:
    Type: String
    Description: SSM Parameter Store prefix for configuration
    Default: /genai/cognito

  DeployNonce:
    Type: String
    Description: Nonce to force stack updates
    Default: '0'

  AuthCheckVersionArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/AuthCheckVersionArn

  AuthCallbackVersionArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/AuthCallbackVersionArn

  BucketName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/BucketName

  DomainName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/DomainName

  WebApplicationFirewallACLArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/WebApplicationFirewallACLArn

  CertificateId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/CertificateId

  CognitoUserEmail:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /genai/cognito/CognitoUserEmail


Mappings:
  NetworkMap:
    ap-southeast-1: #Singapore
      cidr: 10.1.0.0/16
      cfprefixlist: pl-31a34658
      certId: 8186a3c2-b2cb-4c40-9210-86f79070d7ba


Resources:

  # Lambda to read SecureString SSM parameters (not supported by AWS::SSM::Parameter::Value)
  SecureParamReaderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMSecureAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterPrefix}/*'

  SecureParamReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SecureParamReaderRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  value = boto3.client('ssm').get_parameter(
                      Name=event['ResourceProperties']['ParameterName'],
                      WithDecryption=True
                  )['Parameter']['Value']
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'Value': value})
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  GoogleClientSecret:
    Type: Custom::SSMSecureParam
    Properties:
      ServiceToken: !GetAtt SecureParamReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/GoogleClientSecret'

  FacebookAppSecret:
    Type: Custom::SSMSecureParam
    Properties:
      ServiceToken: !GetAtt SecureParamReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/FacebookAppSecret'

  AmazonAppSecret:
    Type: Custom::SSMSecureParam
    Properties:
      ServiceToken: !GetAtt SecureParamReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/AmazonAppSecret'

  CloudFrontDistributionStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BucketName}.s3.${BucketRegion}.amazonaws.com/${Prefix}/cloudfront.yaml'
      Parameters:
        DomainName: !Ref DomainName
        WebApplicationFirewallACLArn: !Ref WebApplicationFirewallACLArn
        CertificateId: !Ref CertificateId
        AuthCheckVersionArn: !Ref AuthCheckVersionArn
        AuthCallbackVersionArn: !Ref AuthCallbackVersionArn
      Tags:
        - Key: Name
          Value: CloudfrontDistributionStack

  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BucketName}.s3.${BucketRegion}.amazonaws.com/${Prefix}/cognito.yaml'
      Parameters:
        ParameterPrefix: !Ref ParameterPrefix
        CognitoUserEmail: !Ref CognitoUserEmail
        GoogleClientSecret: !GetAtt GoogleClientSecret.Value
        FacebookAppSecret: !GetAtt FacebookAppSecret.Value
        AmazonAppSecret: !GetAtt AmazonAppSecret.Value
      Tags:
        - Key: Name
          Value: CognitoStack

  VpcStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BucketName}.s3.${BucketRegion}.amazonaws.com/${Prefix}/vpc.yaml'
      Parameters:
        VpcCidrBlock: !FindInMap [NetworkMap, !Ref AWS::Region, cidr]
      Tags:
        - Key: Name
          Value: VpcStack

  AsgElbStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${BucketName}.s3.${BucketRegion}.amazonaws.com/${Prefix}/alb-asg.yaml'
      Parameters:
        Domain: !Ref DomainName
        CertId: !FindInMap [NetworkMap, !Ref AWS::Region, certId]
        SourcePrefixListId: !FindInMap [NetworkMap, !Ref AWS::Region, cfprefixlist]
        VpcId: !GetAtt VpcStack.Outputs.VpcId
        PublicSubnetId: !GetAtt VpcStack.Outputs.PublicSubnetOne
        PublicSubnetTwoId: !GetAtt VpcStack.Outputs.PublicSubnetTwo
        PrivateSubnetId: !GetAtt VpcStack.Outputs.PrivateSubnetOne
        CloudFrontALBSecretName: !GetAtt CloudFrontDistributionStack.Outputs.CloudFrontALBSecretName
      Tags:
        - Key: Name
          Value: AsgElbStack
