AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Comprehensive Network Infrastructure with VPC, Multi-AZ Subnets, Security Groups, and Web Application Stack

Parameters:
  Prefix:
    Type: String
    Description: Name to Prefix Resources

  BucketRegion:
    Type: String
    Description: Region where S3 Bucket for CloudFormation Template exists

  ParameterPrefix:
    Type: String
    Description: SSM Parameter Store prefix for configuration
    Default: /genai/cognito


Mappings:
  NetworkMap:
    ap-southeast-1: #Singapore
      cidr: 10.1.0.0/16
      cfprefixlist: pl-31a34658
      certId: 8186a3c2-b2cb-4c40-9210-86f79070d7ba


Resources:

  # Lambda function to retrieve SSM parameters
  SSMParameterReaderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterPrefix}/*'

  SSMParameterReaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SSMParameterReaderRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          
          ssm = boto3.client('ssm')
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  parameter_name = event['ResourceProperties']['ParameterName']
                  with_decryption = event['ResourceProperties'].get('WithDecryption', 'true').lower() == 'true'
                  
                  response = ssm.get_parameter(
                      Name=parameter_name,
                      WithDecryption=with_decryption
                  )
                  
                  value = response['Parameter']['Value']
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'Value': value
                  })
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Error': str(e)
                  })

  # Retrieve parameters from SSM
  BucketNameParam:
    Type: Custom::SSMParameter
    Properties:
      ServiceToken: !GetAtt SSMParameterReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/BucketName'
      WithDecryption: false

  DomainNameParam:
    Type: Custom::SSMParameter
    Properties:
      ServiceToken: !GetAtt SSMParameterReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/DomainName'
      WithDecryption: false

  WebApplicationFirewallACLArnParam:
    Type: Custom::SSMParameter
    Properties:
      ServiceToken: !GetAtt SSMParameterReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/WebApplicationFirewallACLArn'
      WithDecryption: false

  CertificateIdParam:
    Type: Custom::SSMParameter
    Properties:
      ServiceToken: !GetAtt SSMParameterReaderFunction.Arn
      ParameterName: !Sub '${ParameterPrefix}/CertificateId'
      WithDecryption: false

  CloudFrontDistributionStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 
        - 'https://${Bucket}.s3.${BucketRegion}.amazonaws.com/${Prefix}/cloudfront.yaml'
        - Bucket: !GetAtt BucketNameParam.Value
      Parameters:
        DomainName: !GetAtt DomainNameParam.Value
        WebApplicationFirewallACLArn: !GetAtt WebApplicationFirewallACLArnParam.Value
        CertificateId: !GetAtt CertificateIdParam.Value
      Tags:
        - Key: Name
          Value: CloudfrontDistributionStack

  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 
        - 'https://${Bucket}.s3.${BucketRegion}.amazonaws.com/${Prefix}/cognito.yaml'
        - Bucket: !GetAtt BucketNameParam.Value
      Parameters:
        ParameterPrefix: !Ref ParameterPrefix
      Tags:
        - Key: Name
          Value: CognitoStack

  VpcStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 
        - 'https://${Bucket}.s3.${BucketRegion}.amazonaws.com/${Prefix}/vpc.yaml'
        - Bucket: !GetAtt BucketNameParam.Value
      Parameters:
        VpcCidrBlock: !FindInMap [NetworkMap, !Ref AWS::Region, cidr]
      Tags:
        - Key: Name
          Value: VpcStack


  AsgElbStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 
        - 'https://${Bucket}.s3.${BucketRegion}.amazonaws.com/${Prefix}/alb-asg.yaml'
        - Bucket: !GetAtt BucketNameParam.Value
      Parameters:
        Domain: !GetAtt DomainNameParam.Value
        CertId: !FindInMap [NetworkMap, !Ref AWS::Region, certId]
        SourcePrefixListId: !FindInMap [NetworkMap, !Ref AWS::Region, cfprefixlist]
        VpcId: !GetAtt VpcStack.Outputs.VpcId
        PublicSubnetId: !GetAtt VpcStack.Outputs.PublicSubnetOne
        PublicSubnetTwoId: !GetAtt VpcStack.Outputs.PublicSubnetTwo
        PrivateSubnetId: !GetAtt VpcStack.Outputs.PrivateSubnetOne
        CloudFrontALBSecretName: !GetAtt CloudFrontDistributionStack.Outputs.CloudFrontALBSecretName
      Tags:
        - Key: Name
          Value: AsgElbStack