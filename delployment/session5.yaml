AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster with ALB for Bedrock and S3 API Application - Singapore Region'

# ====================
# Parameters Section
# ====================
Parameters:
  CertificateId:
    Description: ACM Certificate ID for the region
    Type: String

  ECRRepositoryURI:
    Type: String
    Description: URI of the existing ECR repository (e.g., 123456789012.dkr.ecr.ap-southeast-1.amazonaws.com/my-app:latest)
    Default: 875692608981.dkr.ecr.ap-southeast-1.amazonaws.com/apcr/aip-5

  ContainerCpu:
    Type: Number
    Default: 1024
    Description: CPU units for the container (256, 512, 1024, 2048, 4096)
    AllowedValues:
      - 256
      - 512
      - 1024
      - 2048
      - 4096

  ContainerMemory:
    Type: Number
    Default: 2048
    Description: Memory for the container in MB
    AllowedValues:
      - 512
      - 1024
      - 2048
      - 4096
      - 8192

  DesiredCount:
    Type: Number
    Default: 2
    Description: Desired number of ECS tasks

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: ID of the existing VPC

  ApplicationLoadBalancerArn:
    Description: ARN of the Application Load Balancer
    Type: String

  ECSClusterName:
    Description: Name of the ECS Cluster
    Type: String

  ECSTaskExecutionRoleArn:
    Description: ARN of the ECS Task Execution Role
    Type: String

  ECSTaskRoleArn:
    Description: ARN of the ECS Task Role
    Type: String

  CloudWatchLogGroup:
    Description: ARN of the CloudWatch Log Group
    Type: String

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: List of private subnet IDs for ECS tasks (comma-separated)

  ECSTaskSecurityGroup:
    Description: Security Group for ECS Tasks
    Type: AWS::EC2::SecurityGroup::Id

  CloudFrontALBSecretName:
    Type: String
    Description: Name of the secret containing headers for CloudFront-ALB origin verification

# ====================
# Resources Section
# ====================
Resources:

  # Target Group
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: 'apcr-aip-5-tg'
      Port: 8501
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /_stcore/health
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-299
      Tags:
        - Key: Name
          Value: apcr-aip-5-tg

  CloudFrontALBVerificationRule:
    Type: 'AWS::ElasticLoadBalancingV2::ListenerRule'
    Description: "Listener rule that verifies requests contain the proper CloudFront origin headers"
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: !Join ['', ['{{resolve:secretsmanager:', !Ref CloudFrontALBSecretName, ':SecretString:HEADER_NAME}}']]
            Values:
              - !Join ['', ['{{resolve:secretsmanager:', !Ref CloudFrontALBSecretName, ':SecretString:HEADER_VALUE}}']]
      ListenerArn: !Ref HttpsListener
      Priority: 1

  # # ALB Listener
  # ALBListener:
  #   Type: AWS::ElasticLoadBalancingV2::Listener
  #   Description: "HTTP listener that redirects all traffic to HTTPS for security"
  #   Properties:
  #     DefaultActions:
  #     - Type: "redirect"
  #       RedirectConfig:
  #         Protocol: "HTTPS"
  #         Port: 8405
  #         Host: "#{host}"
  #         Path: "/#{path}"
  #         Query: "#{query}"
  #         StatusCode: "HTTP_301"
  #     LoadBalancerArn: !Ref ApplicationLoadBalancerArn
  #     Port: 80
  #     Protocol: HTTP


  HttpsListener:
    Type: "AWS::ElasticLoadBalancingV2::Listener"
    Description: "HTTPS listener for the web application load balancer"
    Properties:
      DefaultActions:
      - Type: fixed-response
        FixedResponseConfig: 
          ContentType: text/html
          MessageBody: "Resource Not Found"
          StatusCode: 404
      LoadBalancerArn: !Ref ApplicationLoadBalancerArn
      Certificates: 
        - CertificateArn: !Sub 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${CertificateId}'
      Port: 8405
      Protocol: HTTPS
      SslPolicy: "ELBSecurityPolicy-2016-08"


  # ====================
  # ECS Task Definition
  # ====================
  
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: apcr-aip-5-task
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn  # Fixed: Use parameter
      TaskRoleArn: !Ref ECSTaskRoleArn                # Fixed: Use parameter
      ContainerDefinitions:
        - Name: bedrock-app
          Image: !Ref ECRRepositoryURI
          Essential: true
          PortMappings:
            - ContainerPort: 8501
              Protocol: tcp
          Environment:
            - Name: AWS_DEFAULT_REGION
              Value: ap-southeast-1
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogGroup  # Assuming this is a name
              awslogs-region: ap-southeast-1
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:8501/_stcore/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Name
          Value: apcr-aip-5-task

  # ====================
  # ECS Service
  # ====================
  
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${AWS::StackName}-service'
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups:
            - !Ref ECSTaskSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: bedrock-app
          ContainerPort: 8501
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Name
          Value: apcr-aip-5-service

  # ====================
  # Auto Scaling
  # ====================
  
  ServiceScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 10
      MinCapacity: 2
      ResourceId: !Sub 'service/${ECSClusterName}/${ECSService.Name}' 
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ServiceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: apcr-aip-5-cpu-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ServiceScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 75.0



Outputs:

  ECSServiceName:
    Description: Name of the ECS Service
    Value: !Ref ECSService

  TaskDefinitionArn:
    Description: ARN of the Task Definition
    Value: !Ref TaskDefinition

  TargetGroupArn:
    Description: ARN of the Target Group
    Value: !Ref TargetGroup
  TargetGroupName:
    Description: Name of the Target Group
    Value: !GetAtt TargetGroup.TargetGroupName

  # ALBListenerArn:
  #   Description: ARN of the ALB Listener
  #   Value: !Ref ALBListener

  ApplicationURL:
    Description: URL to access the application
    Value: !Sub 'http://${ApplicationLoadBalancerArn}'

  ServiceArn:
    Description: ARN of the ECS Service
    Value: !GetAtt ECSService.ServiceArn

  ECSClusterUsed:
    Description: ECS Cluster Name used for this deployment
    Value: !Ref ECSClusterName

  ContainerConfiguration:
    Description: Container configuration details
    Value: !Sub 'CPU: ${ContainerCpu}, Memory: ${ContainerMemory}MB, Desired Count: ${DesiredCount}'

  AutoScalingTargetId:
    Description: Auto Scaling Target Resource ID
    Value: !Ref ServiceScalingTarget

  AutoScalingPolicyArn:
    Description: ARN of the Auto Scaling Policy
    Value: !Ref ServiceScalingPolicy
